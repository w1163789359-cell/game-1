                        <span id="progress-text">1/10</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">

                </div>

                <!-- 题目区域 -->
                <div id="question-container" class="mb-6">

                <div id="feedback-container" class="hidden mb-6 p-4 rounded-xl">

        // 默认题库
        const defaultQuestions = [
 // 理财小知识题库 - 共100题（单选题60题，判断题40题）
   // 理财小知识题库 100题（60道单选题 +40道判断题）

    {
        type: 'multiple',
        question: '以下哪种行为是合理的储蓄习惯？',
        options: ['把所有的零花钱都花光', '把一部分零花钱存起来，留着以后用', '向同学借钱买东西'],
        answer: '把一部分零花钱存起来，留着以后用',
        correctHint: '答对了！学会“先存后花”是理财的第一步，哪怕只存10%，也能积少成多。',
        wrongHint: '不对哦，学会“先存后花”是理财的第一步，哪怕只存10%，也能积少成多。'
    },
    {
        type: 'multiple',
        question: '如果你看到一款很喜欢的玩具，但价格很贵，你应该怎么做？',
        options: ['马上找爸妈要钱买', '先冷静想一想，是否真的需要，或者等打折时再考虑', '偷偷从家里拿钱去买'],
        answer: '先冷静想一想，是否真的需要，或者等打折时再考虑',
        correctHint: '答对了！学会“延迟满足”，给自己冷静期，能避免冲动消费。',
        wrongHint: '不对哦，学会“延迟满足”，给自己冷静期，能避免冲动消费。'
    },
    {
        type: 'multiple',
        question: '“需要”和“想要”的区别是什么？',

        answer: '一部分存起来，一部分用来买学习用品，一小部分作为零花',
        correctHint: '答对了！压岁钱可以按“储蓄+消费+分享”的方式分配，学会规划。',

        correctHint: '答对了！信用是人的无形资产，按时还钱才能赢得别人的信任。',

        answer: '钱会变多（获得利息）',
        correctHint: '答对了！把钱存银行不仅安全，还能获得利息，让钱“生”钱。',
        wrongHint: '不对哦，把钱存银行不仅安全，还能获得利息，让钱“生”钱。'

        type: 'multiple',
        question: '什么是“预算”？',

        // 函数：开始答题
        function startQuiz() {
            // 随机抽取10道题
            currentQuestions = getRandomQuestions(defaultQuestions, 10);
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            
            // 更新界面
            updateProgress();
            showQuestion(currentQuestionIndex);
            
            // 显示答题界面
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');

        // 函数：从题库中随机抽取指定数量的题目
        function getRandomQuestions(questions, count) {
            const shuffled = [...questions].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // 函数：显示当前题目
        function showQuestion(index) {
            const question = currentQuestions[index];
            questionText.textContent = question.question;
            
            // 清空选项容器
            optionsContainer.innerHTML = '';
            
            // 添加选项
            question.options.forEach((option, i) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option p-3 rounded-xl cursor-pointer transition-all duration-200 option-hover';
                optionElement.style.border = '1px solid #e5e7eb';
                optionElement.style.padding = '16px';
                optionElement.style.marginBottom = '12px';
                
                // 如果用户已经回答过这个问题，显示选择状态
                if (userAnswers[index] === option) {
                    const isCorrect = option === question.answer;
                    optionElement.style.backgroundColor = isCorrect ? '#06D6A0' : '#EF476F';
                    optionElement.style.color = 'white';
                    optionElement.style.borderColor = isCorrect ? '#06D6A0' : '#EF476F';
                    optionElement.classList.remove('option-hover');
                }
                
                optionElement.textContent = option;
                optionElement.addEventListener('click', () => selectOption(option));
                optionsContainer.appendChild(optionElement);
            });
            
            // 更新反馈区域
            if (userAnswers[index] !== null) {
                const isCorrect = userAnswers[index] === question.answer;
                showFeedback(isCorrect);
            } else {
                feedbackContainer.classList.add('hidden');
            }
            
            // 更新按钮状态
            prevBtn.disabled = index === 0;
            nextBtn.textContent = index === currentQuestions.length - 1 ? '完成' : '下一题';
        }

        // 函数：选择选项
        function selectOption(option) {
            const question = currentQuestions[currentQuestionIndex];
            const isCorrect = option === question.answer;
            
            // 记录用户答案
            userAnswers[currentQuestionIndex] = option;
            
            // 更新分数
            if (isCorrect && userAnswers[currentQuestionIndex] === option) {
                score++;
            }
            
            // 更新选项样式
            const options = optionsContainer.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent;
                if (optText === option) {
                    opt.style.backgroundColor = isCorrect ? '#06D6A0' : '#EF476F';
                    opt.style.color = 'white';
                } else if (optText === question.answer) {
                    opt.style.backgroundColor = '#06D6A0';
                    opt.style.color = 'white';
                }
                opt.classList.remove('option-hover');
                opt.style.pointerEvents = 'none';
            });
            
            // 显示反馈
            showFeedback(isCorrect);
            
            // 播放音效
            playSound(isCorrect);
        }

            const confettiCount = 50;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = '50%';
                confetti.style.left = `${Math.random() * 100}vw`;
                confetti.style.top = '-20px';
                confetti.style.zIndex = '9999';
                confetti.style.pointerEvents = 'none';
                
                // 使用JS动画代替CSS动画
                const duration = (Math.random() * 3 + 2) * 1000;
                const delay = Math.random() * 2000;
                
                setTimeout(() => {
                    let startTime = null;
                    const animate = (timestamp) => {
                        if (!startTime) startTime = timestamp;
                        const progress = (timestamp - startTime) / duration;
                        
                        if (progress < 1) {
                            confetti.style.transform = `translateY(${window.innerHeight * 2 * progress}px) rotate(${360 * progress}deg)`;
                            confetti.style.opacity = 1 - progress;
                            requestAnimationFrame(animate);
                        } else {
                            if (confetti.parentNode) {
                                confetti.parentNode.removeChild(confetti);
                            }
                        }
                    };
                    requestAnimationFrame(animate);
                }, delay);
                
                document.body.appendChild(confetti);
            }
        }

        // 函数：播放音效
        function playSound(isCorrect) {
            // 使用Web Audio API生成音效（无需外部文件，所有平台兼容）
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (isCorrect) {
                    // 答对音效：欢快的上升音
                    playCorrectSound(audioContext);
                } else {
                    // 答错音效：低沉的提示音
                    playWrongSound(audioContext);
                }
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }
        
        // 答对音效
        function playCorrectSound(audioContext) {
            const notes = [523.25, 659.25, 783.99]; // C5, E5, G5 和弦
            
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + index * 0.1);
                gainNode.gain.exponentialDecayToValueAtTime?.(0.01, audioContext.currentTime + index * 0.1 + 0.3) 
                    || gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + index * 0.1 + 0.3);
                
                oscillator.start(audioContext.currentTime + index * 0.1);
                oscillator.stop(audioContext.currentTime + index * 0.1 + 0.3);
            });
        }
        
        // 答错音效
        function playWrongSound(audioContext) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 函数：显示上一题
        function showPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                updateProgress();
                showQuestion(currentQuestionIndex);
            }
        }

        // 函数：显示下一题或完成答题
        function showNextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                updateProgress();
                showQuestion(currentQuestionIndex);
            } else {
                showResult();
            }
        }

        // 函数：更新进度
        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / currentQuestions.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressText.textContent = `${currentQuestionIndex + 1}/${currentQuestions.length}`;
        }

        // 函数：显示结果
        function showResult() {
            // 计算正确和错误的题目数量
            const correct = userAnswers.filter((answer, index) => answer === currentQuestions[index].answer).length;
            const wrong = userAnswers.filter((answer, index) => answer !== currentQuestions[index].answer).length;
            
            // 更新结果界面
            scoreText.textContent = `${correct}/${currentQuestions.length}`;
            correctCount.textContent = correct;
            wrongCount.textContent = wrong;
            
            // 显示结果动画
            showResultAnimation(correct);
            
            // 显示结果界面
            startScreen.classList.add('hidden');
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
        }

        // 函数：显示结果动画
        function showResultAnimation(correctCount) {
            resultAnimation.innerHTML = '';
            
            if (correctCount === currentQuestions.length) {
                // 全部正确
                const pandaImg = document.createElement('img');
                pandaImg.src = 'https://game2-right.oss-cn-beijing.aliyuncs.com/%E8%AD%A6%E5%AF%9F%E7%82%B9%E8%B5%9E2.jpg';
                pandaImg.className = 'w-32 h-32 object-contain animate-bounce-slow';
                resultAnimation.appendChild(pandaImg);
            } else if (correctCount >= currentQuestions.length / 2) {
                // 大部分正确
                const pandaImg = document.createElement('img');
                pandaImg.src = 'https://game2-right.oss-cn-beijing.aliyuncs.com/%E8%AD%A6%E5%AF%9F%E7%82%B9%E8%B5%9E2.jpg';
                pandaImg.className = 'w-32 h-32 object-contain';
                resultAnimation.appendChild(pandaImg);
            } else {
                // 大部分错误
                const foxImg = document.createElement('img');
                foxImg.src = 'https://game1-wrong.oss-cn-beijing.aliyuncs.com/%E8%AD%A6%E5%AF%9F%E5%8A%A0%E6%B2%B9.jpg';
                foxImg.className = 'w-32 h-32 object-contain';
                resultAnimation.appendChild(foxImg);
            }
        }



        // 函数：显示开始界面
        function showStartScreen() {
            startScreen.classList.remove('hidden');
            quizScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            customizeScreen.classList.add('hidden');
        }


    </script>
